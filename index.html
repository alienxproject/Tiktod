<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Player</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.video-item {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* tombol video player standar */
.control-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 55px;
  color: white;
  cursor: pointer;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.2s ease;
  user-select: none;
}

.control-btn.show {
  opacity: 0.9;
}

.duration {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 5px;
  color: white;
}

.gradient {
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.info {
  position: absolute;
  bottom: 20px;
  left: 10px;
  right: 10px;
  color: white;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script src="data/videos.js"></script>

<script>
const feed = document.getElementById("feed");

let items = [];

// render
videos.forEach(v => {

  feed.innerHTML += `
    <div class="video-item">

      <video 
        src="${v.src}" 
        poster="${v.thumb}" 
        playsinline>
      </video>

      <div class="control-btn">▶</div>

      <div class="duration">${v.duration}</div>

      <div class="gradient"></div>

      <div class="info">
        <h3>${v.title}</h3>
        <span>${v.views}</span>
      </div>

    </div>
  `;
});

items = document.querySelectorAll(".video-item");

// UX CONTROL
items.forEach((item, index) => {

  const video = item.querySelector("video");
  const btn = item.querySelector(".control-btn");

  let hideTimer;

  function showBtn() {
    btn.classList.add("show");
    clearTimeout(hideTimer);

    hideTimer = setTimeout(() => {
      btn.classList.remove("show");
    }, 1500);
  }

  // TAP VIDEO / BUTTON → SHOW CONTROL
  item.addEventListener("click", () => {

    showBtn();

    if (video.paused) {
      video.play().catch(()=>{});
      btn.textContent = "❚❚";
    } else {
      video.pause();
      btn.textContent = "▶";
    }

  });

  // sync icon state
  video.addEventListener("play", () => {
    btn.textContent = "❚❚";
  });

  video.addEventListener("pause", () => {
    btn.textContent = "▶";
  });

});

// AUTO PLAY SYSTEM (HOME vs NEXT)
const observer = new IntersectionObserver((entries) => {

  entries.forEach(entry => {

    const video = entry.target.querySelector("video");
    const index = [...items].indexOf(entry.target);

    if (entry.isIntersecting && entry.intersectionRatio > 0.7) {

      document.querySelectorAll("video").forEach(v => {
        if (v !== video) v.pause();
      });

      // HOME manual only
      if (index === 0) {
        video.pause();
      }

      // NEXT auto play
      if (index > 0) {
        video.play().catch(()=>{});
      }

    } else {
      video.pause();
    }

  });

}, {
  threshold: 0.7
});

items.forEach(item => observer.observe(item));
</script>

</body>
</html>
