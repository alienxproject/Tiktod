<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Player</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

/* hide scrollbar */
.feed::-webkit-scrollbar {
  display: none;
}

.video-item {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* tombol selalu ada */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 50px;
  color: white;
  cursor: pointer;
  z-index: 10;
  opacity: 0.8;
}

.duration {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 5px;
  color: white;
}

.gradient {
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.info {
  position: absolute;
  bottom: 20px;
  left: 10px;
  right: 10px;
  color: white;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script src="data/videos.js"></script>

<script>
const feed = document.getElementById("feed");

let videosEl = [];
let currentIndex = 0;

// render
videos.forEach((v, index) => {
  feed.innerHTML += `
    <div class="video-item">

      <video 
        src="${v.src}" 
        poster="${v.thumb}" 
        preload="none"
        playsinline
        muted>
      </video>

      <div class="play-btn">▶</div>

      <div class="duration">${v.duration}</div>
      <div class="gradient"></div>

      <div class="info">
        <h3>${v.title}</h3>
        <span>${v.views}</span>
      </div>

    </div>
  `;
});

// ambil semua video & tombol
videosEl = document.querySelectorAll(".video-item");

// PLAY BUTTON CONTROL
videosEl.forEach((item, index) => {

  const video = item.querySelector("video");
  const btn = item.querySelector(".play-btn");

  // play / pause toggle manual
  btn.addEventListener("click", () => {

    if (video.paused) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  });

});

// AUTO PLAY SAAT SCROLL (INTI LOGIC TIKTOK)
const observer = new IntersectionObserver((entries) => {

  entries.forEach(entry => {

    const video = entry.target.querySelector("video");

    if (entry.isIntersecting && entry.intersectionRatio > 0.7) {

      // stop semua video lain
      document.querySelectorAll("video").forEach(v => {
        if (v !== video) {
          v.pause();
          v.currentTime = v.currentTime; // tetap posisi
        }
      });

      // auto play video aktif
      video.play().catch(()=>{});

      currentIndex = [...videosEl].indexOf(entry.target);

    } else {
      // kalau keluar layar → stop
      video.pause();
    }

  });

}, {
  threshold: 0.7
});

// observe semua video item
videosEl.forEach(item => observer.observe(item));
</script>

</body>
</html>
