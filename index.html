<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTod</title>
<link rel="icon" href="https://static.vecteezy.com/system/resources/thumbnails/045/832/436/small_2x/3d-pink-alphabet-letter-t-png.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: fixed;
    /* touch-action: none di body tidak cukup di Chrome Android,
       dihandle lewat preventDefault di touchmove non-passive */
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── FEED CONTAINER ── */
  #feed {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  /* ── EACH VIDEO SLOT ── */
  .slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
    will-change: transform;
  }

  .slide.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 2;
  }

  .slide video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── GRADIENT OVERLAY ── */
  .slide::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.15) 0%,
      transparent 30%,
      transparent 55%,
      rgba(0,0,0,0.6) 100%
    );
    pointer-events: none;
    z-index: 3;
  }

  /* ── INFO BLOCK ── */
  .info {
    position: absolute;
    bottom: 70px;
    left: 14px;
    right: 80px;
    z-index: 5;
    color: #fff;
  }

  .info h3 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.01em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .info span {
    font-size: 12px;
    opacity: 0.75;
    font-weight: 400;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    position: absolute;
    bottom: 44px;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.2);
    z-index: 6;
    cursor: pointer;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 2px;
    transition: width 0.1s linear;
    pointer-events: none;
  }

  /* ── PLAY/PAUSE ICON ── */
  .play-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    font-size: 64px;
    color: #fff;
    z-index: 7;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    text-shadow: 0 0 30px rgba(0,0,0,0.6);
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .play-icon.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* ── LOGO ── */
  #logoHome {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 9999;
    cursor: pointer;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  #logoHome:active { transform: scale(0.93); }

  #logoHome img {
    width: 90px;
    height: auto;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }

  /* ── SWIPE HINT ── */
  #swipeHint {
    position: fixed;
    bottom: 90px;
    left: 50%;
    /* transform dihandle oleh wrapper agar animasi tidak konflik dengan centering */
    z-index: 9999;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    padding: 8px 18px;
    border-radius: 24px;
    pointer-events: none;
    white-space: nowrap;
    /* Gunakan visibility + opacity agar animasi tidak bertabrakan */
    opacity: 0;
    visibility: hidden;
    /* translate center, translateY dipakai animasi */
    transform: translateX(-50%) translateY(0px);
    transition: opacity 0.45s ease, visibility 0.45s ease;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  /* Step 1: fade in (class ini ditambah JS) */
  #swipeHint.show {
    opacity: 1;
    visibility: visible;
    /* animasi bounce baru jalan setelah visible */
    animation: hintBounce 1.3s ease-in-out 0.45s infinite;
  }

  /* Step 2: fade out (class ini ditambah JS) */
  #swipeHint.hide {
    opacity: 0;
    visibility: hidden;
    animation: none;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }

  @keyframes hintBounce {
    0%, 100% { transform: translateX(-50%) translateY(0px); }
    50%       { transform: translateX(-50%) translateY(-9px); }
  }

  /* ── INDEX DOTS ── */
  #dots {
    position: fixed;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 60vh;
    overflow: hidden;
    align-items: center;
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: all 0.25s;
    flex-shrink: 0;
  }

  .dot.active {
    background: #fff;
    height: 16px;
    border-radius: 3px;
  }

  /* ── SWIPE TRANSITION OVERLAY ── */
  #swipeOverlay {
    position: fixed;
    inset: 0;
    z-index: 8;
    pointer-events: none;
    background: #000;
    opacity: 0;
    transition: opacity 0.1s;
  }
</style>
</head>
<body>

<!-- LOGO -->
<div id="logoHome">
  <img src="https://i.ibb.co.com/5XCdSQrN/Tik-Tod-1.png" alt="TikTod">
</div>

<!-- SWIPE HINT -->
<div id="swipeHint">☝️ swipe up untuk next</div>

<!-- SIDE DOTS -->
<div id="dots"></div>

<!-- SWIPE OVERLAY -->
<div id="swipeOverlay"></div>

<!-- FEED -->
<div id="feed"></div>

<!-- Videos data -->
<script src="data/videos.js"></script>

<script>
/*
 * TikTod — Clean Architecture
 * Features: swipe lock (1 per swipe), autoplay, lazy preload,
 *           audio always on after first interaction, play/pause click,
 *           CTA redirect (2nd pause), auto-next on end, loop, logo reset,
 *           progress bar, shuffle, no double-swipe.
 */

// ─── UTILS ─────────────────────────────────────────────────────────────────

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── STATE ──────────────────────────────────────────────────────────────────

const videoList = shuffle(videos); // Shuffle sekali, simpan di variable baru
const total = videoList.length;

let current = 0;          // index aktif
let locked  = false;      // mencegah double swipe
let interacted = false;   // user sudah touch/klik?

const feed      = document.getElementById('feed');
const dots      = document.getElementById('dots');
const overlay   = document.getElementById('swipeOverlay');
const swipeHint = document.getElementById('swipeHint');

// Array DOM slide
const slides = [];

// pauseCount per video (untuk CTA redirect)
const pauseCount = new Array(total).fill(0);

// ─── BUILD DOM ──────────────────────────────────────────────────────────────

videoList.forEach((v, i) => {
  // Slide wrapper
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.index = i;

  // Video element
  const vid = document.createElement('video');
  vid.setAttribute('playsinline', '');
  vid.setAttribute('webkit-playsinline', '');
  vid.loop = true; // Loop tiap video
  vid.muted = true;
  vid.preload = 'none';
  if (v.thumb) vid.poster = v.thumb;

  // Hanya video pertama langsung load src
  if (i === 0) {
    vid.src = v.src;
    vid.preload = 'metadata';
  } else {
    vid.dataset.src = v.src;
  }

  // Info
  const info = document.createElement('div');
  info.className = 'info';
  info.innerHTML = `<h3>${v.title || ''}</h3><span>${v.views || ''}</span>`;

  // Progress
  const progressWrap = document.createElement('div');
  progressWrap.className = 'progress-wrap';
  const progressFill = document.createElement('div');
  progressFill.className = 'progress-fill';
  progressWrap.appendChild(progressFill);

  // Play icon
  const playIcon = document.createElement('div');
  playIcon.className = 'play-icon';
  playIcon.textContent = '⏸';

  slide.appendChild(vid);
  slide.appendChild(info);
  slide.appendChild(progressWrap);
  slide.appendChild(playIcon);
  feed.appendChild(slide);
  slides.push(slide);

  // ── Events per slide ──

  // timeupdate → progress bar
  vid.addEventListener('timeupdate', () => {
    if (!vid.duration) return;
    progressFill.style.width = (vid.currentTime / vid.duration * 100) + '%';
  });

  // Video ended → auto next
  // PENTING: bypass locked karena ended bisa fire saat lock dari swipe belum selesai
  vid.addEventListener('ended', () => {
    if (i !== current) return; // abaikan video yang bukan aktif
    locked = false; // force unlock dulu
    navigateTo((current + 1) % total);
  });

  // Click → play/pause
  slide.addEventListener('click', (e) => {
    if (locked) return;
    e.stopPropagation();

    // Set interacted SYNCHRONOUS dalam user gesture (Chrome Android audio policy)
    interacted = true;

    if (vid.paused) {
      // Play dengan audio — safePlay handle semua edge case
      safePlay(vid, true);
      playIcon.textContent = '▶';
      flashIcon(playIcon);
    } else {
      pauseCount[i]++;
      vid.pause();
      playIcon.textContent = '⏸';
      flashIcon(playIcon);

      // CTA redirect saat pause ke-2
      if (pauseCount[i] >= 2 && videoList[i].cta) {
        setTimeout(() => {
          window.location.href = videoList[i].cta;
        }, 350);
      }
    }
  });

  // Progress bar click → seek
  progressWrap.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!vid.duration) return;
    const rect = progressWrap.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    vid.currentTime = ratio * vid.duration;
  });
});

// Dot indicators
videoList.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dots.appendChild(dot);
});

// ─── NAVIGATION ─────────────────────────────────────────────────────────────

function getVideo(index) {
  return slides[index].querySelector('video');
}

// Lazy load src — kembalikan Promise yang resolve saat video siap di-play
function loadVideo(index) {
  const vid = getVideo(index);
  // Kalau src belum di-set, set sekarang
  if (!vid.src && vid.dataset.src) {
    vid.src = vid.dataset.src;
  }
  return vid;
}

function flashIcon(icon) {
  icon.classList.add('show');
  clearTimeout(icon._timer);
  icon._timer = setTimeout(() => icon.classList.remove('show'), 900);
}

// Tunggu video siap di-play (readyState >= 3 = HAVE_FUTURE_DATA)
// Dengan timeout safety agar tidak stuck selamanya
function waitReady(vid, timeout = 4000) {
  return new Promise((resolve) => {
    if (vid.readyState >= 3) { resolve(); return; }
    const onReady = () => { cleanup(); resolve(); };
    const timer   = setTimeout(() => { cleanup(); resolve(); }, timeout);
    function cleanup() {
      vid.removeEventListener('canplay', onReady);
      vid.removeEventListener('error',   onReady);
      clearTimeout(timer);
    }
    vid.addEventListener('canplay', onReady, { once: true });
    vid.addEventListener('error',   onReady, { once: true }); // error pun resolve agar tidak stuck
  });
}

// Fungsi play yang aman — handle semua edge case Chrome Android
async function safePlay(vid, withAudio) {
  // Reset ke awal hanya kalau video sudah loaded (bukan saat baru lazy-load)
  // Bug lama: currentTime = 0 saat readyState = 0 throw error silent
  if (vid.readyState >= 1) {
    vid.currentTime = 0;
  }

  // Set muted SYNCHRONOUS sebelum play (wajib Chrome Android audio policy)
  vid.muted = !withAudio;

  // Tunggu video siap
  await waitReady(vid);

  // Reset lagi setelah load kalau tadi readyState masih 0
  if (vid.currentTime !== 0) vid.currentTime = 0;

  try {
    await vid.play();
  } catch (err) {
    // Kalau gagal dengan audio → fallback muted
    if (!vid.muted) {
      vid.muted = true;
      try { await vid.play(); } catch (_) { /* benar-benar gagal, biarkan */ }
    }
  }
}

function navigateTo(nextIndex, instant = false) {
  if (locked && !instant) return;
  if (nextIndex === current && !instant) return;

  locked = true;

  // Safety: pastikan unlock terjadi meski ada error tak terduga
  const unlockTimer = setTimeout(() => { locked = false; }, 1500);

  current = nextIndex;

  // Pause & deaktifkan semua slide lain
  slides.forEach((s, i) => {
    if (i !== current) {
      const v = s.querySelector('video');
      v.pause();
      s.classList.remove('active');
    }
  });

  // Aktifkan slide baru
  const nextSlide = slides[current];
  nextSlide.classList.add('active');

  // Update dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });

  // Lazy load current + preload next
  const vid = loadVideo(current);
  loadVideo((current + 1) % total); // preload, tidak perlu tunggu

  if (current === 0 && !interacted) {
    // Video pertama sebelum interaksi → tunjukkan play icon, jangan autoplay
    const pi = nextSlide.querySelector('.play-icon');
    pi.textContent = '▶';
    pi.classList.add('show');
    clearTimeout(unlockTimer);
    locked = false;
  } else {
    // Autoplay dengan audio kalau sudah interaksi
    safePlay(vid, interacted).then(() => {
      clearTimeout(unlockTimer);
      // Unlock setelah video benar-benar mulai play (lebih reliable dari setTimeout)
      locked = false;
    });
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────

// Aktifkan slide pertama
slides[0].classList.add('active');
loadVideo(1); // Preload video ke-2

// Tampilkan play icon di video pertama
const firstPlayIcon = slides[0].querySelector('.play-icon');
firstPlayIcon.textContent = '▶';
firstPlayIcon.classList.add('show');

// ── Swipe Hint: muncul 800ms setelah load, hilang setelah 4 detik atau saat swipe pertama
let hintDismissed = false;

function dismissHint() {
  if (hintDismissed) return;
  hintDismissed = true;
  swipeHint.classList.remove('show');
  swipeHint.classList.add('hide');
}

setTimeout(() => {
  if (hintDismissed) return;
  swipeHint.classList.add('show');
  // Auto hilang setelah 4 detik
  setTimeout(dismissHint, 4000);
}, 800);

// ─── TOUCH SWIPE — Chrome Android Fix ───────────────────────────────────────
// KRITIS: touchmove HARUS non-passive agar e.preventDefault() bisa dipanggil
// Tanpa ini, Chrome Android tetap scroll native meski ada handler kita

let touchStartY   = 0;
let touchStartX   = 0;
let touchStartTime = 0;
let touchIsVertical = false; // true setelah gerakan vertical terkonfirmasi

feed.addEventListener('touchstart', (e) => {
  if (locked) return;
  touchStartY      = e.touches[0].clientY;
  touchStartX      = e.touches[0].clientX;
  touchStartTime   = Date.now();
  touchIsVertical  = false;
}, { passive: true }); // touchstart boleh passive

feed.addEventListener('touchmove', (e) => {
  // HARUS non-passive supaya preventDefault bisa dipanggil
  const dy = touchStartY - e.touches[0].clientY;
  const dx = touchStartX - e.touches[0].clientX;

  if (!touchIsVertical) {
    // Tentukan arah sekali saja setelah 8px gerakan
    if (Math.abs(dy) < 8 && Math.abs(dx) < 8) return;
    touchIsVertical = Math.abs(dy) >= Math.abs(dx);
  }

  if (touchIsVertical) {
    // BLOCK native scroll Chrome Android
    e.preventDefault();
  }
}, { passive: false }); // ← NON-PASSIVE, wajib untuk preventDefault

feed.addEventListener('touchend', (e) => {
  if (!touchIsVertical) return; // bukan swipe vertikal, abaikan
  if (locked) return;

  const dy      = touchStartY - e.changedTouches[0].clientY;
  const elapsed = Date.now() - touchStartTime;
  const velocity = Math.abs(dy) / Math.max(elapsed, 1);

  // Threshold: 40px minimum ATAU swipe cepat
  if (Math.abs(dy) < 40 && velocity < 0.3) return;

  // Set interacted SEKARANG (dalam user gesture) sebelum play dipanggil
  // Ini penting untuk Chrome Android audio policy
  interacted = true;
  dismissHint();

  if (dy > 0) {
    navigateTo((current + 1) % total);
  } else {
    navigateTo((current - 1 + total) % total);
  }
}, { passive: true });

// ─── KEYBOARD (Desktop) ──────────────────────────────────────────────────────

document.addEventListener('keydown', (e) => {
  if (locked) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    dismissHint();
    navigateTo((current + 1) % total);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    navigateTo((current - 1 + total) % total);
  } else if (e.key === ' ') {
    e.preventDefault();
    slides[current].click();
  }
});

// ─── MOUSE WHEEL (Desktop) ───────────────────────────────────────────────────

let wheelCooldown = false;
feed.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (locked || wheelCooldown) return;
  wheelCooldown = true;
  setTimeout(() => wheelCooldown = false, 500);
  dismissHint();
  if (e.deltaY > 0) {
    navigateTo((current + 1) % total);
  } else {
    navigateTo((current - 1 + total) % total);
  }
}, { passive: false });

// ─── LOGO HOME ───────────────────────────────────────────────────────────────

document.getElementById('logoHome').addEventListener('click', (e) => {
  e.stopPropagation();
  if (current === 0) {
    // Sudah di home, reset video
    const vid = getVideo(0);
    vid.currentTime = 0;
    vid.pause();
    const pi = slides[0].querySelector('.play-icon');
    pi.textContent = '▶';
    pi.classList.add('show');
    return;
  }
  navigateTo(0, true);
});

// ─── AUDIO UNLOCK ────────────────────────────────────────────────────────────
// Tidak perlu listener terpisah — interacted di-set synchronous
// langsung di dalam touchend dan click handler (user gesture).
// Chrome Android hanya izinkan unmute jika dipanggil synchronous
// di dalam stack call yang dimulai dari user gesture.
</script>
</body>
</html>
