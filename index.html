<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Player</title>

<link rel="icon" href="https://url.png">

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.video-item {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* PLAY BUTTON */
.control-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 55px;
  color: white;
  z-index: 10;
  opacity: 0;
  transition: 0.2s;
  cursor: pointer;
}

.control-btn.show {
  opacity: 0.9;
}

/* INFO */
.info {
  position: absolute;
  bottom: 50px;
  left: 10px;
  right: 10px;
  color: white;
  z-index: 5;
}

/* PROGRESS BAR */
.progress-container {
  position: absolute;
  bottom: 25px;
  left: 10px;
  right: 10px;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 5px;
  cursor: pointer;
  opacity: 0;
  transition: 0.2s;
  z-index: 6;
}

.progress-container.show {
  opacity: 1;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
  border-radius: 5px;
}

/* DURATION COUNTDOWN */
.duration {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 5px;
  color: white;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script src="data/videos.js"></script>

<script>
const feed = document.getElementById("feed");

let items = [];

// render UI
videos.forEach(v => {

  feed.innerHTML += `
    <div class="video-item">

      <video src="${v.src}" poster="${v.thumb}" playsinline></video>

      <div class="control-btn">▶</div>

      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>

      <div class="duration">0:00</div>

      <div class="info">
        <h3>${v.title}</h3>
        <span>${v.views}</span>
      </div>

    </div>
  `;
});

items = document.querySelectorAll(".video-item");

// FORMAT TIME
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec < 10 ? "0"+sec : sec}`;
}

// PLAYER CONTROL
items.forEach(item => {

  const video = item.querySelector("video");
  const btn = item.querySelector(".control-btn");
  const bar = item.querySelector(".progress-bar");
  const container = item.querySelector(".progress-container");
  const durationEl = item.querySelector(".duration");

  let hideTimer;

  // ▶ PLAY / PAUSE
  item.addEventListener("click", () => {

    container.classList.add("show");
    btn.classList.add("show");

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      container.classList.remove("show");
      btn.classList.remove("show");
    }, 1500);

    if (video.paused) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  });

  // ⏱ REAL DURATION + COUNTDOWN
  video.addEventListener("loadedmetadata", () => {
    durationEl.textContent = formatTime(video.duration);
  });

  // 📊 PROGRESS REALTIME
  video.addEventListener("timeupdate", () => {

    const percent = (video.currentTime / video.duration) * 100;
    bar.style.width = percent + "%";

    // countdown update
    const remaining = video.duration - video.currentTime;
    durationEl.textContent = formatTime(remaining);

  });

  // 🎯 SEEK (drag click)
  container.addEventListener("click", (e) => {

    const rect = container.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;

    if (!isNaN(video.duration)) {
      video.currentTime = pos * video.duration;
    }

  });

});

// AUTO PLAY SYSTEM (HOME vs NEXT)
const observer = new IntersectionObserver((entries) => {

  entries.forEach(entry => {

    const video = entry.target.querySelector("video");

    const index = [...items].indexOf(entry.target);

    if (entry.isIntersecting && entry.intersectionRatio > 0.7) {

      // stop other videos
      document.querySelectorAll("video").forEach(v => {
        if (v !== video) v.pause();
      });

      // HOME manual
      if (index === 0) {
        video.pause();
      }

      // NEXT auto play
      if (index > 0) {
        video.play().catch(()=>{});
      }

    } else {
      video.pause();
    }

  });

}, {
  threshold: 0.7
});

items.forEach(item => observer.observe(item));
</script>

</body>
</html>
