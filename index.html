<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTod</title>

<link rel="icon" href="https://static.vecteezy.com/system/resources/thumbnails/045/832/436/small_2x/3d-pink-alphabet-letter-t-png.png">

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

/* FULL SCREEN FIX */
.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

/* 🔥 FULL 1 LAYAR (IMPORTANT FIX) */
.video-item {
  height: 100vh;
  width: 100vw;
  position: relative;
  scroll-snap-align: start;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* FULL COVER FIX */
}

/* CONTROL BUTTON */
.control-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 55px;
  color: white;
  z-index: 10;
  opacity: 0;
  transition: 0.2s;
  cursor: pointer;
}

.control-btn.show {
  opacity: 0.9;
}

/* PROGRESS */
.progress-container {
  position: absolute;
  bottom: 25px;
  left: 10px;
  right: 10px;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 5px;
  opacity: 0;
  transition: 0.2s;
  z-index: 6;
}

.progress-container.show {
  opacity: 1;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
}

/* DURATION */
.duration {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 5px;
  color: white;
}

/* INFO */
.info {
  position: absolute;
  bottom: 60px;
  left: 10px;
  right: 10px;
  color: white;
  z-index: 5;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script src="data/videos.js"></script>

<script>
/* 🔥 SHUFFLE SEKALI SAJA SAAT LOAD */
(function () {
  if (!window.__videosShuffled) {

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    shuffle(videos);

    // 🔒 LOCK supaya tidak ke-random lagi
    window.__videosShuffled = true;
  }
})();
</script>
  
<script>
const feed = document.getElementById("feed");

let items = [];
let currentIndex = 0;

// RENDER
videos.forEach(v => {

  feed.innerHTML += `
    <div class="video-item">

      <video src="${v.src}" poster="${v.thumb}" playsinline></video>

      <div class="control-btn">▶</div>

      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>

      <div class="duration">0:00</div>

      <div class="info">
        <h3>${v.title}</h3>
        <span>${v.views}</span>
      </div>

    </div>
  `;
});

items = document.querySelectorAll(".video-item");

// 🔥 TAMPILKAN PLAY BUTTON DI VIDEO PERTAMA SAAT LOAD
const firstBtn = items[0].querySelector(".control-btn");
firstBtn.classList.add("show");
firstBtn.textContent = "▶";
  
// FORMAT TIME
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec < 10 ? "0"+sec : sec}`;
}

// CONTROL SYSTEM (TIDAK DIRUSAK)
items.forEach(item => {

  const video = item.querySelector("video");
  const btn = item.querySelector(".control-btn");
  const bar = item.querySelector(".progress-bar");
  const container = item.querySelector(".progress-container");
  const durationEl = item.querySelector(".duration");

  let hideTimer;

  // PLAY / PAUSE
  item.addEventListener("click", () => {

    container.classList.add("show");
    btn.classList.add("show");

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      container.classList.remove("show");
      btn.classList.remove("show");
    }, 1500);

    if (video.paused) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  });

  // REAL DURATION
  video.addEventListener("loadedmetadata", () => {
    durationEl.textContent = formatTime(video.duration);
  });

  // COUNTDOWN + PROGRESS
  video.addEventListener("timeupdate", () => {

    const percent = (video.currentTime / video.duration) * 100;
    bar.style.width = percent + "%";

    const remaining = video.duration - video.currentTime;
    durationEl.textContent = formatTime(remaining);

  });

  // AUTO NEXT VIDEO WHEN END 🔥 (FIX UTAMA YANG KAMU MAU)
  video.addEventListener("ended", () => {

    // swipe ke video berikutnya
    const current = [...items].indexOf(item);
    const next = items[current + 1];

    if (next) {
      next.scrollIntoView({ behavior: "smooth" });

      const nextVideo = next.querySelector("video");
      setTimeout(() => {
        nextVideo.play().catch(()=>{});
      }, 300);
    }

  });

});

// AUTO PLAY (HOME vs NEXT)
const observer = new IntersectionObserver((entries) => {

  entries.forEach(entry => {

    const video = entry.target.querySelector("video");
    const index = [...items].indexOf(entry.target);

    if (entry.isIntersecting && entry.intersectionRatio > 0.7) {

      // stop others
      document.querySelectorAll("video").forEach(v => {
        if (v !== video) v.pause();
      });

      // HOME manual
      if (index === 0) {
        video.pause();
      }

      // NEXT auto play
      if (index > 0) {
        video.play().catch(()=>{});
      }

      currentIndex = index;

    } else {
      video.pause();
    }

  });

}, {
  threshold: 0.7
});

items.forEach(item => observer.observe(item));
</script>
<script>
const feedEl = document.getElementById("feed");
let startY = 0;
let endY = 0;

feedEl.addEventListener("touchstart", (e) => {
  startY = e.touches[0].clientY;
});

feedEl.addEventListener("touchend", (e) => {
  endY = e.changedTouches[0].clientY;

  const delta = startY - endY;

  // hanya deteksi swipe ke atas (next video)
  if (delta > 50) {

    const scrollBottom = feedEl.scrollTop + feedEl.clientHeight;
    const scrollHeight = feedEl.scrollHeight;

    // 🔥 cek apakah sedang di video terakhir
    if (scrollBottom >= scrollHeight - 5) {

      // lompat ke video pertama TANPA animasi
      feedEl.scrollTo({
        top: 0,
        behavior: "auto"
      });

    }

  }

});
</script>
</body>
</html>
