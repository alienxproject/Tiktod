<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Player</title>

<link rel="icon" href="https://url.png">

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.video-item {
  height: 100vh;
  width: 100vw;
  position: relative;
  scroll-snap-align: start;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BUTTON */
.control-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 55px;
  color: white;
  z-index: 10;
  opacity: 0;
  transition: 0.2s;
}

.control-btn.show {
  opacity: 0.9;
}

/* PROGRESS */
.progress-container {
  position: absolute;
  bottom: 25px;
  left: 10px;
  right: 10px;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 5px;
  opacity: 0;
  transition: 0.2s;
}

.progress-container.show {
  opacity: 1;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
}

/* DURATION */
.duration {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 5px;
  color: white;
}

/* INFO */
.info {
  position: absolute;
  bottom: 60px;
  left: 10px;
  right: 10px;
  color: white;
  z-index: 5;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script src="data/videos.js"></script>
