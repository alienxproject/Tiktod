<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTod</title>

<style>
body { margin:0; background:black; overflow:hidden; font-family:sans-serif; }

.feed {
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.video-item {
  height:100vh;
  scroll-snap-align:start;
  position:relative;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}

.control-btn {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
  color:white;
  opacity:0;
  transition:.2s;
}
.control-btn.show { opacity:1; }

.progress-container {
  position:absolute;
  bottom:25px; left:10px; right:10px;
  height:4px;
  background:rgba(255,255,255,.2);
}
.progress-bar {
  height:100%;
  width:0%;
  background:white;
}

.info {
  position:absolute;
  bottom:60px;
  left:10px;
  color:white;
}
</style>
</head>

<body>
<div class="feed" id="feed"></div>

<script src="data/videos.js"></script>

<script>
// ======================
// 🔥 RANDOM + ROTATE
// ======================
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}
shuffle(videos);

const startIndex = Math.floor(Math.random()*videos.length);
videos = videos.slice(startIndex).concat(videos.slice(0,startIndex));

// ======================
// STATE
// ======================
const feed = document.getElementById("feed");
let items = [];
let currentIndex = 0;
let hasInteracted = false;
let isProgrammaticScroll = false;

// 🔥 ANTI REPEAT MEMORY
let history = [];
const HISTORY_LIMIT = 6;

// ======================
// NORMALIZE
// ======================
function normalizeIndex(i){
  if(i<0) return items.length-1;
  if(i>=items.length) return 0;
  return i;
}

// ======================
// 🔥 ANTI REPEAT PICKER
// ======================
function getNextIndex(dir=1){
  let tries = 0;
  let next;

  do {
    next = normalizeIndex(currentIndex + dir);
    if (!history.includes(next)) break;

    // kalau bentrok, lompat random
    next = Math.floor(Math.random()*items.length);

    tries++;
  } while(tries < 10);

  return next;
}

// ======================
// RENDER
// ======================
videos.forEach((v,i)=>{
  feed.innerHTML += `
    <div class="video-item">
      <video ${i===0?`src="${v.src}" preload="metadata"`:`data-src="${v.src}" preload="none"`} playsinline muted></video>

      <div class="control-btn">▶</div>

      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>

      <div class="info">
        <h3>${v.title}</h3>
        <span>${v.views}</span>
      </div>
    </div>
  `;
});

items = document.querySelectorAll(".video-item");

// ======================
// CORE
// ======================
function activate(index){
  index = normalizeIndex(index);
  currentIndex = index;

  // 🔥 update history
  history.push(index);
  if(history.length > HISTORY_LIMIT) history.shift();

  const video = items[index].querySelector("video");

  document.querySelectorAll("video").forEach(v=>{
    if(v!==video) v.pause();
  });

  if(!video.src) video.src = video.dataset.src;
  video.preload="auto";

  video.dataset.userPause="false";

  if(index===0 && !hasInteracted){
    video.pause();
  } else {
    video.play().catch(()=>{});
  }

  document.querySelectorAll("video").forEach(v=>v.muted=true);
  if(hasInteracted) video.muted=false;

  // preload next
  [index+1,index+2].forEach(i=>{
    if(items[i]){
      let v=items[i].querySelector("video");
      if(!v.src) v.src=v.dataset.src;
      v.preload="auto";
    }
  });
}

// ======================
// OBSERVER
// ======================
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    const i=[...items].indexOf(e.target);
    if(e.isIntersecting && e.intersectionRatio>0.75){
      if(!isProgrammaticScroll){
        activate(i);
      }
    }
  });
},{threshold:0.75});

items.forEach(i=>observer.observe(i));

// ======================
// CLICK
// ======================
items.forEach((item,index)=>{
  const video=item.querySelector("video");
  const btn=item.querySelector(".control-btn");
  const bar=item.querySelector(".progress-bar");

  let timer;

  item.addEventListener("click",()=>{
    hasInteracted=true;

    if(video.paused){
      video.play().catch(()=>{});
    } else {
      video.dataset.userPause="true";
      video.pause();
    }

    btn.classList.add("show");
    clearTimeout(timer);
    timer=setTimeout(()=>btn.classList.remove("show"),1000);

    document.querySelectorAll("video").forEach(v=>v.muted=true);
    video.muted=false;
  });

  video.addEventListener("timeupdate",()=>{
    if(!video.duration) return;
    bar.style.width=(video.currentTime/video.duration)*100+"%";
  });

  video.dataset.pauseCount="0";

  video.addEventListener("pause",()=>{
    if(video.dataset.userPause==="true" && index===currentIndex){
      let c=parseInt(video.dataset.pauseCount);
      c++;
      video.dataset.pauseCount=c;
      video.dataset.userPause="false";

      if(c>=2 && !video.dataset.redirected){
        video.dataset.redirected="true";
        setTimeout(()=>{
          window.location.href = videos[index].cta;
        },300);
      }
    }
  });

  video.addEventListener("ended",()=>{
    scrollToIndex(getNextIndex(1));
  });
});

// ======================
// SWIPE
// ======================
let startY=0;

feed.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

feed.addEventListener("touchend",e=>{
  let delta=startY-e.changedTouches[0].clientY;
  if(Math.abs(delta)<50) return;

  hasInteracted=true;

  if(delta>0){
    scrollToIndex(getNextIndex(1));
  } else {
    scrollToIndex(getNextIndex(-1));
  }
});

// ======================
// SCROLL CONTROL
// ======================
function scrollToIndex(index){
  isProgrammaticScroll=true;

  activate(index);

  items[currentIndex].scrollIntoView({behavior:"auto"});

  setTimeout(()=>isProgrammaticScroll=false,120);
}
</script>

</body>
</html>
