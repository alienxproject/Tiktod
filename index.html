<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Player</title>

<link rel="icon" href="https://static.vecteezy.com/system/resources/thumbnails/045/832/436/small_2x/3d-pink-alphabet-letter-t-png.png">

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

.video-item {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
}

/* 🔥 FULL SCREEN FIX */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTROL */
.control-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 55px;
  color: white;
  z-index: 10;
  opacity: 0;
  transition: 0.2s;
}

.control-btn.show {
  opacity: 0.9;
}

/* INFO */
.info {
  position: absolute;
  bottom: 40px;
  left: 10px;
  right: 10px;
  color: white;
  z-index: 5;
}

/* PROGRESS */
.progress-container {
  position: absolute;
  bottom: 20px;
  left: 10px;
  right: 10px;
  height: 3px;
  background: rgba(255,255,255,0.2);
  border-radius: 5px;
  opacity: 0;
  transition: 0.2s;
  z-index: 6;
}

.progress-container.show {
  opacity: 1;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script src="data/videos.js"></script>

<script>
const feed = document.getElementById("feed");

let items = [];
let currentIndex = 0;

// render
videos.forEach(v => {

  feed.innerHTML += `
    <div class="video-item">

      <video src="${v.src}" poster="${v.thumb}" playsinline></video>

      <div class="control-btn">▶</div>

      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>

      <div class="info">
        <h3>${v.title}</h3>
        <span>${v.views}</span>
      </div>

    </div>
  `;
});

items = document.querySelectorAll(".video-item");

// format
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec < 10 ? "0"+sec : sec}`;
}

// scroll to next video
function goTo(index) {
  if (index >= items.length) return;

  items[index].scrollIntoView({ behavior: "smooth" });
}

// PLAYER LOGIC
items.forEach((item, index) => {

  const video = item.querySelector("video");
  const btn = item.querySelector(".control-btn");
  const bar = item.querySelector(".progress-bar");
  const container = item.querySelector(".progress-container");

  let hideTimer;

  // PLAY / PAUSE TAP
  item.addEventListener("click", () => {

    container.classList.add("show");
    btn.classList.add("show");

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      container.classList.remove("show");
      btn.classList.remove("show");
    }, 1500);

    if (video.paused) {
      video.play().catch(()=>{});
    } else {
      video.pause();
    }

  });

  // PROGRESS BAR
  video.addEventListener("timeupdate", () => {
    if (!video.duration) return;

    const percent = (video.currentTime / video.duration) * 100;
    bar.style.width = percent + "%";
  });

  // 🔥 AUTO NEXT WHEN VIDEO ENDS
  video.addEventListener("ended", () => {

    video.pause();
    bar.style.width = "0%";

    // swipe ke video berikutnya
    goTo(index + 1);

  });

});

// 🔥 AUTO PLAY BASED ON VIEW
const observer = new IntersectionObserver((entries) => {

  entries.forEach(entry => {

    const video = entry.target.querySelector("video");
    const index = [...items].indexOf(entry.target);

    if (entry.isIntersecting && entry.intersectionRatio > 0.7) {

      document.querySelectorAll("video").forEach(v => {
        if (v !== video) v.pause();
      });

      currentIndex = index;

      // HOME manual
      if (index === 0) {
        video.pause();
      }

      // NEXT auto play
      if (index > 0) {
        video.play().catch(()=>{});
      }

    } else {
      video.pause();
    }

  });

}, {
  threshold: 0.7
});

items.forEach(item => observer.observe(item));
</script>

</body>
</html>
