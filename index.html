
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTod</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.video-item {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 50px;
  color: white;
  cursor: pointer;
}

.duration {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 5px;
  color: white;
}

.gradient {
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.info {
  position: absolute;
  bottom: 20px;
  left: 10px;
  right: 10px;
  color: white;
}

.info h3 {
  margin: 0;
  font-size: 16px;
}

.views {
  position: absolute;
  bottom: 0;
  right: 0;
  font-size: 12px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script src="data/videos.js"></script>

<script>
const feed = document.getElementById("feed");

let hasTriggered = false;
let hasRedirected = false;
let timer = null;

videos.forEach(v => {
  feed.innerHTML += `
    <div class="video-item">

      <video 
        src="${v.src}" 
        poster="${v.thumb}" 
        preload="none">
      </video>

      <div class="duration">${v.duration}</div>

      <div class="gradient"></div>

      <div class="info">
        <h3>${v.title}</h3>
        <span class="views">${v.views}</span>
      </div>

      <div class="play-btn" onclick="playVideo(this, '${v.cta}')">▶</div>

    </div>
  `;
});

function playVideo(btn, link){
  const container = btn.parentElement;
  const video = container.querySelector("video");

  video.play();
  btn.style.display = "none";

  if(hasRedirected) return;

  if(!hasTriggered){
    timer = setTimeout(() => {
      video.pause();
      hasTriggered = true;
    }, 5000);
  } else {
    hasRedirected = true;
    window.location.href = link;
  }

  video.onpause = () => clearTimeout(timer);
}

window.addEventListener("scroll", () => {
  document.querySelectorAll("video").forEach(v => v.pause());
});
</script>

</body>
</html>
