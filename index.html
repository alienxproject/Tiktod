<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Player</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.video-item {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 50px;
  color: white;
  cursor: pointer;
  z-index: 5;
}

.duration {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 5px;
  color: white;
  z-index: 3;
}

.gradient {
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  z-index: 2;
}

.info {
  position: absolute;
  bottom: 20px;
  left: 10px;
  right: 10px;
  color: white;
  z-index: 3;
}

.info h3 {
  margin: 0;
  font-size: 16px;
}

.views {
  position: absolute;
  bottom: 0;
  right: 0;
  font-size: 12px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script src="data/videos.js"></script>

<script>
const feed = document.getElementById("feed");

// STATE PER VIDEO (bukan global lagi)
let activeTimer = null;
let redirectDone = new Set();

videos.forEach(v => {
  feed.innerHTML += `
    <div class="video-item">

      <video 
        src="${v.src}" 
        poster="${v.thumb}" 
        preload="none"
        playsinline
      ></video>

      <div class="duration">${v.duration}</div>
      <div class="gradient"></div>

      <div class="info">
        <h3>${v.title}</h3>
        <span class="views">${v.views}</span>
      </div>

      <div class="play-btn">▶</div>

    </div>
  `;
});

// PLAY HANDLER (FIX UTAMA)
document.querySelectorAll(".play-btn").forEach((btn, index) => {

  btn.addEventListener("click", function () {

    const container = this.parentElement;
    const video = container.querySelector("video");
    const link = videos[index].cta;

    // play aman (handle error silent)
    const playPromise = video.play();

    if (playPromise !== undefined) {
      playPromise.catch(err => {
        console.log("Play error:", err);
      });
    }

    this.style.display = "none";

    // kalau sudah redirect untuk video ini → stop
    if (redirectDone.has(index)) return;

    // reset timer sebelumnya
    clearTimeout(activeTimer);

    activeTimer = setTimeout(() => {

      video.pause();
      redirectDone.add(index); // hanya video ini yg kena

    }, 5000);

    // kalau user klik play lagi setelah pause → redirect
    video.addEventListener("play", function onceRedirect() {

      if (redirectDone.has(index)) {
        window.location.href = link;
      }

    }, { once: true });

    video.onpause = () => {
      clearTimeout(activeTimer);
    };

  });

});

// pause semua video saat scroll
window.addEventListener("scroll", () => {
  document.querySelectorAll("video").forEach(v => v.pause());
});
</script>

</body>
</html>
